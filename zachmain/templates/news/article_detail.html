{% extends "base.html" %}

{% block content %}
  <div class="container mt-4">
    <h1>{{ article.title }}</h1>
    <p class="text-muted">{{ article.created_at }}</p>
    {% if article.image %}
      <img src="{{ article.image.url }}"
           class="img-fluid mb-4"
           alt="{{ article.title }}" />
    {% endif %}
    <div>{{ article.content|safe }}</div>
  </div>
{% endblock %}
